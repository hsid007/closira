version: "3.9"

services:
  api:
    build: .
    container_name: closira-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - DEBUG=true
      - DATABASE_URL=sqlite+aiosqlite:///./closira.db
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
    volumes:
      - ./app:/app/app
      - closira_data:/app/data
    restart: unless-stopped

volumes:
  closira_data:
